<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <radialGradient id="ae-glow" cx="35%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0f2d2a"/>
      <stop offset="55%" stop-color="#0a1018"/>
      <stop offset="100%" stop-color="#07070d"/>
    </radialGradient>
    <linearGradient id="ae-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#f5b14c"/>
    </linearGradient>
  </defs>
  <!-- window -->
  <rect width="1200" height="760" rx="16" fill="#07070d"/>
  <rect x="16" y="16" width="1168" height="728" rx="12" fill="url(#ae-glow)" stroke="#1c2230" stroke-width="1"/>
  <!-- traffic lights -->
  <circle cx="48" cy="48" r="6" fill="#ff5f57"/><circle cx="70" cy="48" r="6" fill="#febc2e"/><circle cx="92" cy="48" r="6" fill="#28c840"/>
  <!-- stars -->
  <g fill="#cfe9e4">
    <circle cx="220" cy="170" r="1.6" opacity=".9"/><circle cx="980" cy="120" r="1.3" opacity=".7"/>
    <circle cx="760" cy="220" r="2" opacity=".9"/><circle cx="380" cy="300" r="1.2" opacity=".6"/>
    <circle cx="1040" cy="320" r="1.6" opacity=".8"/><circle cx="160" cy="420" r="1.4" opacity=".7"/>
    <circle cx="900" cy="470" r="1.8" opacity=".9"/><circle cx="540" cy="160" r="1.2" opacity=".5"/>
    <circle cx="660" cy="520" r="1.3" opacity=".6"/><circle cx="300" cy="560" r="1.6" opacity=".7"/>
  </g>
  <g stroke="#2dd4bf" stroke-width="1" opacity=".35">
    <line x1="760" y1="220" x2="900" y2="470"/><line x1="900" y1="470" x2="1040" y2="320"/><line x1="760" y1="220" x2="1040" y2="320"/>
  </g>
  <!-- nav -->
  <text x="48" y="100" fill="#f5b14c" font-size="20" font-style="italic">✦ MJ</text>
  <g fill="#8a87a0" font-family="system-ui, sans-serif" font-size="15">
    <text x="640" y="100">About</text><text x="720" y="100">Work</text><text x="800" y="100">Writing</text>
  </g>
  <!-- sun/moon toggle -->
  <rect x="900" y="84" width="78" height="28" rx="14" fill="#11141d" stroke="#2a3142"/>
  <circle cx="916" cy="98" r="9" fill="#f5b14c"/><text x="952" y="103" fill="#8a87a0" font-size="13" font-family="sans-serif">☾</text>
  <!-- ask button -->
  <rect x="1000" y="82" width="136" height="32" rx="16" fill="none" stroke="url(#ae-accent)" stroke-width="1.5"/>
  <text x="1022" y="103" fill="#e8e6f0" font-size="14" font-family="system-ui, sans-serif">Ask Aether  ⌘K</text>
  <!-- hero -->
  <text x="80" y="340" fill="#e8e6f0" font-size="86" font-weight="bold">Malhar Jadhav</text>
  <text x="82" y="400" fill="#9fb8b3" font-size="30" font-style="italic">I build intelligent systems.</text>
  <!-- CTA -->
  <rect x="82" y="440" width="280" height="56" rx="28" fill="url(#ae-accent)"/>
  <text x="120" y="476" fill="#07070d" font-size="19" font-weight="bold" font-family="system-ui, sans-serif">Talk to my AI twin  →</text>
  <!-- stat pills -->
  <g font-family="system-ui, sans-serif" font-size="15" fill="#cfe9e4">
    <rect x="80" y="610" width="200" height="48" rx="24" fill="#0e141c" stroke="#1f6b62"/><text x="108" y="640">◯ 250+ LeetCode</text>
    <rect x="300" y="610" width="160" height="48" rx="24" fill="#0e141c" stroke="#1f6b62"/><text x="328" y="640">◯ GitHub repos</text>
    <rect x="480" y="610" width="190" height="48" rx="24" fill="#0e141c" stroke="#1f6b62"/><text x="508" y="640">◯ Medium writer</text>
  </g>
  <!-- AI dock peek -->
  <rect x="820" y="540" width="316" height="160" rx="14" fill="#0c121a" stroke="#2dd4bf" stroke-opacity=".5"/>
  <text x="844" y="574" fill="#2dd4bf" font-size="13" font-family="monospace">ASK AETHER · AI twin</text>
  <rect x="844" y="590" width="220" height="30" rx="8" fill="#11202020" stroke="#23323a"/><text x="856" y="610" fill="#9fb8b3" font-size="12" font-family="sans-serif">What's his strongest skill?</text>
  <text x="844" y="650" fill="#e8e6f0" font-size="12.5" font-family="sans-serif">› Malhar excels at backend systems &amp;</text>
  <text x="844" y="670" fill="#e8e6f0" font-size="12.5" font-family="sans-serif">  applied AI — 250+ LeetCode solved. ▌</text>
  <text x="48" y="730" fill="#3a4151" font-size="12" font-family="monospace">CONCEPT 1 — AETHER · cosmic-editorial · dark mode</text>
</svg>
