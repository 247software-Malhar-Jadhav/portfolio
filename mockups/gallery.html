<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Malhar Jadhav — Portfolio Concept Gallery</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; background:#0a0a0f; color:#e8e6f0; font-family: ui-sans-serif, system-ui, sans-serif; padding:48px 32px 80px; }
  h1 { font-size:34px; font-weight:800; margin:0 0 4px; }
  p.sub { color:#8a87a0; margin:0 0 40px; font-size:15px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(520px,1fr)); gap:36px; max-width:1400px; margin:0 auto; }
  figure { margin:0; background:#101018; border:1px solid #20202e; border-radius:16px; overflow:hidden; transition:transform .2s, border-color .2s; }
  figure:hover { transform:translateY(-4px); border-color:#2dd4bf; }
  figure img { display:block; width:100%; height:auto; }
  figcaption { padding:16px 20px; font-size:15px; color:#cfcde0; }
  figcaption b { color:#fff; }
  .tag { display:inline-block; margin-left:8px; padding:2px 10px; border-radius:999px; background:#152b28; color:#2dd4bf; font-size:12px; font-weight:600; }
  .pick { border-color:#2dd4bf66; box-shadow:0 0 0 1px #2dd4bf33, 0 20px 60px -20px #2dd4bf44; }
</style>
</head>
<body>
  <h1>Malhar Jadhav — Portfolio Concepts</h1>
  <p class="sub">6 directions · each AI-integrated · dark/lite (sun/moon) · React + Tailwind + shadcn.</p>
  <div class="grid">
    <figure class="pick"><img src="1-aether.svg" alt="AETHER"/><figcaption><b>1 · AETHER</b><span class="tag">top pick</span><br>Cosmic observatory + chat-with-your-AI-twin (⌘K).</figcaption></figure>
    <figure class="pick"><img src="2-terminal.svg" alt="TERMINAL.OS"/><figcaption><b>2 · TERMINAL.OS</b><span class="tag">top pick</span><br>Retro dev console with a live <code>ai "question"</code> command.</figcaption></figure>
    <figure><img src="3-dispatch.svg" alt="DISPATCH"/><figcaption><b>3 · DISPATCH</b><br>Print magazine that AI-rewrites itself per reader.</figcaption></figure>
    <figure><img src="4-flux.svg" alt="FLUX"/><figcaption><b>4 · FLUX</b><br>Loud maximalist with an AI-regenerated hero.</figcaption></figure>
    <figure><img src="5-atlas.svg" alt="ATLAS"/><figcaption><b>5 · ATLAS</b><br>Calm zoomable node-map with a semantic AI navigator.</figcaption></figure>
    <figure><img src="6-deck.svg" alt="DECK"/><figcaption><b>6 · DECK</b><br>Swipeable story cards with a floating AI concierge.</figcaption></figure>
  </div>
</body>
</html>
