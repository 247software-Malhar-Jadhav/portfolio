<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" font-family="system-ui,sans-serif">
  <defs>
    <linearGradient id="dk-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0b0f1a"/><stop offset="100%" stop-color="#141b30"/></linearGradient>
    <radialGradient id="dk-glow" cx="70%" cy="30%" r="60%"><stop offset="0%" stop-color="#e8b04b" stop-opacity=".25"/><stop offset="100%" stop-color="#e8b04b" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1200" height="760" fill="#070a12"/>
  <!-- phone stage -->
  <rect x="380" y="40" width="440" height="680" rx="36" fill="url(#dk-bg)" stroke="#222c44" stroke-width="2"/>
  <rect x="380" y="40" width="440" height="680" rx="36" fill="url(#dk-glow)"/>
  <rect x="540" y="58" width="120" height="20" rx="10" fill="#070a12"/>
  <!-- progress rail -->
  <g>
    <circle cx="540" cy="110" r="5" fill="#39425c"/>
    <circle cx="570" cy="110" r="5" fill="#39425c"/>
    <circle cx="600" cy="110" r="6" fill="#e8b04b"/>
    <circle cx="630" cy="110" r="5" fill="#39425c"/>
    <circle cx="660" cy="110" r="5" fill="#39425c"/>
  </g>
  <text x="412" y="180" fill="#e8b04b" font-size="15" letter-spacing="3" font-family="monospace">01 / HELLO</text>
  <text x="412" y="280" fill="#f4eede" font-size="62" font-weight="bold">I'm</text>
  <text x="412" y="350" fill="#f4eede" font-size="62" font-weight="bold">Malhar.</text>
  <text x="412" y="410" fill="#9aa3bd" font-size="19">Software engineer crafting</text>
  <text x="412" y="438" fill="#9aa3bd" font-size="19">thoughtful, scalable products.</text>
  <text x="412" y="560" fill="#7b85a3" font-size="16">Swipe to explore</text>
  <text x="412" y="592" fill="#e8b04b" font-size="26">↓</text>
  <!-- sun/moon -->
  <rect x="720" y="150" width="60" height="26" rx="13" fill="#10182b" stroke="#2b3550"/>
  <text x="730" y="168" fill="#39425c" font-size="12">☀</text><text x="758" y="168" fill="#e8b04b" font-size="12">☾</text>
  <!-- floating AI concierge -->
  <circle cx="760" cy="640" r="34" fill="#e8b04b"/>
  <text x="760" y="650" text-anchor="middle" fill="#0b0f1a" font-size="26">💬</text>
  <rect x="500" y="600" width="230" height="60" rx="14" fill="#12192b" stroke="#2b3550"/>
  <text x="518" y="626" fill="#e8b04b" font-size="11" font-weight="bold">AI CONCIERGE</text>
  <text x="518" y="648" fill="#aab3cd" font-size="12">Ask me about this card ▌</text>
  <!-- desktop hint -->
  <text x="120" y="390" fill="#4a5573" font-size="14">Snap-scroll chapters:</text>
  <g fill="#5a648a" font-size="13" font-family="monospace">
    <text x="120" y="430">01 Hello</text><text x="120" y="458">02 Skills</text>
    <text x="120" y="486">03 Work</text><text x="120" y="514">04 Writing</text>
    <text x="120" y="542">05 Contact</text>
  </g>
  <text x="40" y="744" fill="#2c3550" font-size="12" font-family="monospace">CONCEPT 6 — DECK · floating AI concierge · swipeable story cards</text>
</svg>
