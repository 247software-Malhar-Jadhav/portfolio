<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" font-family="system-ui,sans-serif">
  <defs>
    <radialGradient id="at-bg" cx="50%" cy="45%" r="70%"><stop offset="0%" stop-color="#121823"/><stop offset="100%" stop-color="#0d1117"/></radialGradient>
    <radialGradient id="at-node" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#56d4dd"/><stop offset="100%" stop-color="#1c6e74"/></radialGradient>
    <pattern id="at-dots" width="32" height="32" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.2" fill="#1c2733"/></pattern>
  </defs>
  <rect width="1200" height="760" fill="#0d1117"/>
  <rect x="24" y="24" width="1152" height="712" rx="14" fill="url(#at-bg)" stroke="#1c2733"/>
