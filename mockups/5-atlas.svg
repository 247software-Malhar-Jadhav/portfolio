  <rect x="56" y="620" width="330" height="90" rx="10" fill="#10161e" stroke="#2a3a48"/>
  <text x="76" y="650" fill="#56d4dd" font-size="12" font-weight="bold">AI NAVIGATOR</text>
  <text x="76" y="676" fill="#aebccb" font-size="12.5">Panning to ML cluster — highlighting</text>
  <text x="76" y="695" fill="#aebccb" font-size="12.5">2 projects &amp; relevant skills. ▌</text>
  <text x="40" y="748" fill="#33414f" font-size="12" font-family="monospace">CONCEPT 5 — ATLAS · semantic AI navigator · zoomable node map</text>
