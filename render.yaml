# Render blueprint — deploys this Vite app as a free, always-on Static Site.
# In the Render dashboard: New → Blueprint → connect this repo → Apply.
services:
  - type: web
    name: aether-portfolio
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    # Single-page app: send unknown paths to index.html (real files like
    # /Malhar-Jadhav-Resume.pdf and /assets/* are served directly first).
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
